<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results · MusicBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/shared.css">
  <link rel="stylesheet" href="./styles/search.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="logo" href="index.html">Music<span>Box</span></a>

      <ul class="nav-links">
        <li><a href="browse.html">Albums</a></li>
        <li><a href="#">Members</a></li>
        <li><a href="#">Journal</a></li>
        <li><a href="#">Charts</a></li>
      </ul>

      <form class="nav-search nav-search-form" action="search.html" method="get">
        <input class="nav-search-input" type="search" name="q" placeholder="Search artists, albums, or Artist - Album…" aria-label="Search albums, artists, or artist and album" />
      </form>

      <a href="login.html" class="btn btn-outline">Sign In</a>
      <a href="login.html" class="btn btn-primary">Join</a>
    </div>
  </nav>

  <section class="search-hero">
    <h1 class="search-title">Search Results</h1>
  </section>

  <main class="section search-section">
    <div class="section-head">
      <span class="result-count" aria-live="polite">Loading...</span>
    </div>

    <div class="albums-grid" aria-live="polite"></div>

    <div class="pagination" aria-label="Search results pagination">
      <button class="btn btn-outline page-btn" data-action="prev">← Previous</button>
      <span class="page-status" aria-live="polite">Page 1 of 1</span>
      <button class="btn btn-outline page-btn" data-action="next">Next →</button>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2024 Music Box. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
